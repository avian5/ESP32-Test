; ============================================
; ESP32-S3 CAN Controller Project
; PlatformIO Configuration
; ============================================

[env:esp32-s3-devkitm-1]

; ESP32 platform support package
platform = espressif32

; Board definition
board = esp32-s3-devkitm-1

; Use Arduino framework
framework = arduino

; USB serial upload port
upload_port = /dev/cu.usbmodem101

; Serial monitor port
monitor_port = /dev/cu.usbmodem101

; Serial monitor baud rate
monitor_speed = 115200

; PlatformIO echoes typed characters
; (disabled because web interface is primary)
monitor_echo = no

; Enable USB CDC serial on boot
; Required for many ESP32-S3 boards
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1